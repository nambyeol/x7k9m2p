<title>보호된 문서</title>
<style>
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#faf7f2; font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif; }
  .box { background:#fff; border:1px solid #e8e0d5; border-radius:16px; padding:40px 36px;
    box-shadow:0 4px 20px rgba(120,90,50,.08); text-align:center; width:320px; }
  .box h1 { font-size:18px; margin:0 0 6px; color:#2b2622; }
  .box p { font-size:13.5px; color:#6f675e; margin:0 0 20px; }
  input { width:100%; box-sizing:border-box; padding:12px 14px; font-size:15px; border:1px solid #d8cfc2;
    border-radius:10px; outline:none; text-align:center; }
  input:focus { border-color:#b0713a; }
  button { width:100%; margin-top:12px; padding:12px; font-size:15px; font-weight:700; color:#fff;
    background:#b0713a; border:none; border-radius:10px; cursor:pointer; }
  button:hover { background:#9a5f2d; }
  .err { color:#a33b3b; font-size:13px; margin-top:12px; display:none; }
  @media (prefers-color-scheme: dark) {
    body { background:#1c1916; } .box { background:#262220; border-color:#3a342d; }
    .box h1 { color:#ece5db; } input { background:#1c1916; color:#ece5db; border-color:#4a4238; }
  }
</style>
<div class="box">

  <button onclick="unlock()">열기</button>

</div>
